---
- name: Ensure the resource does not exist in Quay
  when:
    - _quay_herve4m_github_io_organizationmirror is defined
    - "'status' in _quay_herve4m_github_io_organizationmirror"
    - "'existInQuay' in _quay_herve4m_github_io_organizationmirror['status']"
    - _quay_herve4m_github_io_organizationmirror['status']['existInQuay']
    - "'spec' not in _quay_herve4m_github_io_organizationmirror
      or 'preserveInQuayOnDeletion' not in _quay_herve4m_github_io_organizationmirror['spec']
      or not _quay_herve4m_github_io_organizationmirror['spec']['preserveInQuayOnDeletion']"
  block:
    - name: Ensure the secret resource that stores the Quay parameters exists
      ansible.builtin.fail:
        msg: "connSecretRef: {{ conn_secret_ref['name'] }}: secret not found"
      when:
        - not secret_found

    - name: Ensure the organizationmirror resource does not exist
      infra.quay_configuration.quay_organization_mirror:
        state: absent
        quay_host: "{{ quay_host | default(omit) }}"
        validate_certs: "{{ validate_certs | default(omit) }}"
        timeout: "{{ timeout | default(omit) }}"
        quay_token: "{{ quay_token | default(omit, true) }}"
        quay_username: "{{ omit if quay_token is defined and quay_token | length > 0 else quay_username | default(omit) }}"
        quay_password: "{{ omit if quay_token is defined and quay_token | length > 0 else quay_password | default(omit) }}"
        external_namespace: "{{ external_namespace | default(omit) }}"
        external_registry_password: "{{ external_registry_password | default(omit) }}"
        external_registry_type: "{{ external_registry_type | default(omit) }}"
        external_registry_url: "{{ external_registry_url | default(omit) }}"
        external_registry_username: "{{ external_registry_username | default(omit) }}"
        force_sync: "{{ force_sync | default(omit) }}"
        http_proxy: "{{ http_proxy | default(omit) }}"
        https_proxy: "{{ https_proxy | default(omit) }}"
        is_enabled: "{{ is_enabled | default(omit) }}"
        no_proxy: "{{ no_proxy | default(omit) }}"
        organization: "{{ organization | default(omit) }}"
        repository_filters: "{{ repository_filters | default(omit) }}"
        robot_username: "{{ robot_username | default(omit) }}"
        skopeo_timeout: "{{ skopeo_timeout | default(omit) }}"
        sync_interval: "{{ sync_interval | default(omit) }}"
        sync_start_date: "{{ sync_start_date | default(omit) }}"
        verify_tls: "{{ verify_tls | default(omit) }}"
        visibility: "{{ visibility | default(omit) }}"

  rescue:
    - name: Ensure the error message is set in the resource status
      operator_sdk.util.k8s_status:
        api_version: quay.herve4m.github.io/v1alpha1
        kind: OrganizationMirror
        name: "{{ ansible_operator_meta['name'] }}"
        namespace: "{{ ansible_operator_meta['namespace'] }}"
        status:
          message: "{{ ansible_failed_result['msg'] }}"

    - name: Ensure the error is raised
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result['msg'] }}"

# Cleaning up the secret because the owner reference mechanism, which enables
# the operator to automatically remove the dependent resources, applies only
# to resources in the same namespace as the CR.
- name: Ensure the secret is removed
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: "{{ ret_secret_ref['name'] }}"
    namespace: "{{ ret_secret_ref['namespace'] | default(ansible_operator_meta['namespace']) }}"
  when:
    - ret_secret_ref is defined
    - "'name' in ret_secret_ref"
    - ret_secret_ref["name"]|length > 0
